@if (contentLoading) {
  <div class="loading">
    <bc-spinner></bc-spinner>
    <span>{{ 'COMMON.LOADING' | translate }}</span>
  </div>
} @else {
  <bc-dialog>
    <div header>
      <bc-icon-button (buttonClick)="dialogClose.emit()" variant="tertiary" icon="cancel"></bc-icon-button>
      <h2 class="mb-0 mr-2">{{ header | translate }}</h2>
    </div>

    <ng-content select="[content]"></ng-content>

    <div buttons class="dialog-footer">
      <ng-content select="[footer]"></ng-content>
    </div>
  </bc-dialog>
}
