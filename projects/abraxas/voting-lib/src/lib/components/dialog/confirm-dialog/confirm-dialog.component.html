<bc-dialog>
  <div header>
    <bc-icon-button (buttonClick)="cancel()" variant="tertiary" icon="cancel"></bc-icon-button>
    <h3 class="mb-0">{{ title | translate }}</h3>
  </div>

  <div>
    <p>{{ message | translate }}</p>
  </div>
  <div buttons>
    @if (showCancel) {
      <bc-button class="mr-2" (buttonClick)="cancel()" [label]="cancelText | translate" variant="tertiary"></bc-button>
    }
    <bc-button cdkFocusInitial variant="primary" (buttonClick)="confirm()" [label]="confirmText | translate"></bc-button>
  </div>
</bc-dialog>
