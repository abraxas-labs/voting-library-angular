<div class="sidebar" [class.sidebar-open]="open" [@openClose]="{ value: open ? 'open' : 'close', params: { width: sidebarWidth } }">
  @if (open) {
    <bc-icon-button class="sidebar-closer" [icon]="'cancel'" [variant]="'tertiary'" (buttonClick)="open = false"></bc-icon-button>
    <ng-container *ngTemplateOutlet="sidebarTemplate" [style.width]="sidebarWidth"></ng-container>
  } @else {
    <bc-icon-button class="sidebar-drawer" [icon]="'angle-left'" [variant]="'tertiary'" (buttonClick)="open = true"></bc-icon-button>
  }
</div>
